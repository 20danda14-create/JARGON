<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jargis - Meslek Jargonları Oyunu</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --correct: #10b981;
            --present: #f59e0b;
            --absent: #475569;
            --border-color: #334155;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            width: 100%;
            border-bottom: 1px solid var(--border-color);
            background-color: #111827;
        }

        h1 {
            margin: 0;
            letter-spacing: 4px;
            color: var(--accent);
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 550px;
            margin-top: 15px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .stat-box {
            background-color: var(--card-bg);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .stat-value {
            font-weight: bold;
            color: var(--accent);
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 550px;
            width: 100%;
            box-sizing: border-box;
        }

        .jargon-hint {
            background-color: #1e1b4b;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.05rem;
            margin-bottom: 20px;
            border: 1px solid #6366f1;
            color: #e0e7ff;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .matrix {
            display: grid;
            gap: 6px;
            margin-bottom: 20px;
        }

        .cell {
            width: 52px;
            height: 52px;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.3s ease;
            background-color: rgba(30, 41, 59, 0.5);
        }

        .cell.correct { background-color: var(--correct); border-color: var(--correct); }
        .cell.present { background-color: var(--present); border-color: var(--present); }
        .cell.absent { background-color: var(--absent); border-color: var(--absent); }

        .input-area {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 14px;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        button {
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: bold;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .message {
            min-height: 25px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .meaning-card {
            background-color: #1e293b;
            border-left: 5px solid var(--accent);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .meaning-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .meaning-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #cbd5e1;
        }

        .next-btn {
            background-color: var(--correct);
            color: white;
            margin-top: 15px;
            display: none;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>JARGIS</h1>
        <small style="color: #94a3b8; letter-spacing: 1px;">sozluk.gov.tr Temelli Meslek Jargonları Oyunu</small>

                { word: "AMORTİ", hint: "Finans / Muhasebe", meaning: "Yatırılan paranın veya alınan duran varlığın zamanla kendini amorti etmesi süreci." },
                { word: "BİLANÇ", hint: "Muhasebe", meaning: "Bir şirketin belirli bir tarihteki varlıklarını, borçlarını ve öz kaynak durumunu gösteren temel mali tablo (Bilanço)." },
                { word: "REKTÖR", hint: "Eğitim / Üniversite", meaning: "Bir üniversitenin yönetiminden, eğitim ve idari işleyişinden sorumlu en üst düzey yönetici." },

                { word: "MÜSVED", hint: "Yazın / Büro", meaning: "Üzerinde düzeltmeler yapılmak amacıyla yazılan, henüz resmiyet kazanmamış taslak kâğıt (Müsvedde)." },
                { word: "İNDEKS", hint: "Bilişim / Yayıncılık", meaning: "Bilişimde verilere hızlı erişim sağlayan dizin yapısı; kitaplarda ise arama dizini." },
                { word: "PLAZMA", hint: "Fizik / Tıp", meaning: "Fizikte gazın iyonize olmuş dördüncü hali; tıpta ise kanın hücrelerinden ayrıştırılmış sıvı kısmı." },
                { word: "FİKSTÜ", hint: "Spor / Yayıncılık", meaning: "Spor müsabakalarında karşılaşacak takımların maç takvimini ve sırasını gösteren çizelge (Fikstür)." },
                { word: "KADAST", hint: "Hukuk / Coğrafya", meaning: "Ülkedeki her çeşit arazi ve mülk yerinin sınırlarını ve değerlerini belirleyip plana bağlama işi (Kadastro)." },
                { word: "DEFANS", hint: "Spor / Askeri", meaning: "Bir takımı veya bölgeyi rakip saldırılara karşı koruma amacıyla yapılan savunma düzeni." },
                { word: "KÜVETİ", hint: "Laboratuvar / Kimya", meaning: "Spektrofotometre cihazlarında sıvı örneklerin optik ölçümünü yapmak için kullanılan küçük cam veya plastik tüp (Küvet)." },
                { word: "GRAFİK", hint: "Matematik / Sanat", meaning: "Çizgiler, şemalar veya şekiller yardımıyla verilerin görsel olarak ifade edilmesi yöntemi." },
                { word: "FLAMAN", hint: "Fizik / Elektrik", meaning: "Ampullerin içinde elektrik akımıyla akkor durumuna gelerek ışık yayan ince dirençli tel." },
                { word: "İSTİNA", hint: "Hukuk", meaning: "İlk derece mahkemelerinin verdiği kararların, bir üst mahkeme tarafından yasal olarak yeniden incelenmesi yolu (İstinaf)." },
                { word: "VARYAN", hint: "Biyoloji / Tıp", meaning: "Bir virüsün veya organizmanın mutasyon sonucu ortaya çıkan farklılaşmış yeni alt türü (Varyant)." },
                { word: "BOMBELE", hint: "Mekanik / Sanayi", meaning: "Metal veya cam yüzeylerin dışa doğru kavisli, şişkin hale getirilmesi işlemi (Bombeli)." },
                { word: "REÇETE", hint: "Tıp / Eczacılık", meaning: "Hekimin hastası için gerekli gördüğü ilaçları ve kullanım şeklini üzerine yazdığı resmi belge." }
            ],
            7: [
                { word: "ARTEFAK", hint: "Arkeoloji", meaning: "Antik dönemlerde insan eliyle yapılmış, taşınabilir kültür varlığı niteliğindeki her türlü nesne (Artefakt)." },
                { word: "OTOPOT", hint: "Denizcilik / Havacılık", meaning: "Gemi veya uçakların rotada insan müdahalesi olmadan sabit kalmasını sağlayan otomatik pilot düzeneği (Otopilot)." },
                { word: "OTOMOTİ", hint: "Sanayi / Mühendislik", meaning: "Motorlu kara taşıtlarının tasarımı, üretimi ve pazarlanmasıyla ilgilenen sanayi kolu (Otomotiv)." },
                { word: "GÖZLEME", hint: "Havacılık / Meteoroloji", meaning: "Hava durumunu veya gökyüzü olaylarını belirli araçlarla takip edip kaydetme işi, rasat." },
                { word: "KÜRATÖR", hint: "Sanat / Müzecilik", meaning: "Sergileri düzenleyen, müze koleksiyonlarını yöneten ve sanatsal arşivlerden sorumlu olan uzman." },
                { word: "BİLANÇO", hint: "Muhasebe / Finans", meaning: "Bir ticari kuruluşun belirli bir andaki varlık ve borç dengesini gösteren en temel mali tablo." },
                { word: "STETOSK", hint: "Tıp / Sağlık", meaning: "Hekimlerin kalp ve akciğer seslerini dinlemek için kullandığı tıbbi muayene cihazı (Stetoskop)." },
                { word: "EMPRİME", hint: "Tekstil", meaning: "Kumaş üzerine özel boyalar ve kalıplar kullanılarak renkli desenler basma işlemi veya bu şekilde basılmış kumaş." },
                { word: "MUKAVEL", hint: "Hukuk / Ticaret", meaning: "İki tarafın karşılıklı mutabakatla imzaladığı, yasal yükümlülük doğuran sözleşme (Mukavele)." },
                { word: "REAKTÖR", hint: "Nükleer / Kimya", meaning: "Nükleer zincirleme reaksiyonların kontrollü olarak gerçekleştirildiği veya kimyasal dönüşümlerin yapıldığı büyük tesis ünitesi." },
                { word: "ANESTEZ", hint: "Tıp / Cerrahi", meaning: "Ameliyat öncesinde hastanın ağrı duymasını engellemek amacıyla uygulanan tıbbi duyarsızlaştırma işlemi (Anestezi)." },
                { word: "MÜEZZİN", hint: "Din Hizmetleri", meaning: "Camilerde namaz vaktinin geldiğini bildirmek üzere ezan okuyan ve ibadet düzenine yardımcı olan din görevlisi." },
                { word: "KADASTRO", hint: "Hukuk / Haritacılık", meaning: "Ülke sınırları içindeki taşınmaz malların sınırlarını, alanlarını ve hukuki hak sahiplerini belirleyen resmi sistem." },
                { word: "FAKTORİ", hint: "Finans / Ticaret", meaning: "Şirketlerin vadeli alacaklarını devrederek acil nakit ihtiyaçlarını karşıladıkları finansal yöntem (Faktoring)." },
                { word: "PROTOTİ", hint: "Mühendislik / Tasarım", meaning: "Seri üretime geçilmeden önce test edilmek amacıyla üretilen ilk model, özgün örnek (Prototip)." },
                { word: "VARYANT", hint: "Tıp / Matematik", meaning: "Tıpta mutasyona uğramış virüs tipi; istatistikte ise bir değişkenin aldığı farklı değerlerden her biri." },
                { word: "TUTANAK", hint: "Hukuk / Büro", meaning: "Meclis, mahkeme veya suç mahallinde durumu tespit etmek amacıyla yetkililerce imzalanan resmi yazı, zabıt." },
                { word: "FLAMANL", hint: "Elektrik / Sanayi", meaning: "Ampulün içinde ışık üreten akkor tel mekanizmasının teknik yapısı (Flamanlı)." },
                { word: "TRİBÜNA", hint: "Hukuk / Tarih", meaning: "Antik Roma'da halkın haklarını koruyan yargıçlar kurulu veya günümüzde uluslararası özel mahkemeler (Tribunal)." },
                { word: "KAPSÜLE", hint: "Farmakoloji / Kimya", meaning: "İlaçların yutulmasını kolaylaştırmak için etken maddenin içine konulduğu eriyebilir küçük kılıf (Kapsül)." }
            ]
        };

        // Oyun Planı: 3 adet 4 harfli, 3 adet 5 harfli, 3 adet 6 harfli, 1 adet 7 harfli
        const gameStructure = [4, 4, 4, 5, 5, 5, 6, 6, 6, 7];
        let chosenWords = []; // Rastgele seçilen 10 kelime buraya dolacak

        let currentLevel = 0;
        let currentScore = 0;
        let currentRow = 0;
        let targetWord = "";
        let wordLength = 0;
        let maxGuesses = 0;
        let isLevelOver = false;

        const matrixEl = document.getElementById("matrix");
        const guessInput = document.getElementById("guessInput");
        const guessBtn = document.getElementById("guessBtn");
        const jargonHintEl = document.getElementById("jargonHint");
        const levelInfoEl = document.getElementById("levelInfo");
        const scoreInfoEl = document.getElementById("scoreInfo");
        const messageEl = document.getElementById("message");
        const meaningCard = document.getElementById("meaningCard");
        const meaningTitle = document.getElementById("meaningTitle");
        const meaningText = document.getElementById("meaningText");
        const nextBtn = document.getElementById("nextBtn");
        const inputArea = document.getElementById("inputArea");

        // Kelime havuzundan rastgele kelimeler seçen fonksiyon
        function buildGameSession() {
            chosenWords = [];
            gameStructure.forEach(length => {
                const pool = masterDictionary[length];
                // Havuzdan daha önce bu seansta seçilmemiş rastgele bir kelime seç
                let randomWord;
                do {
                    randomWord = pool[Math.floor(Math.random() * pool.length)];
                } while (chosenWords.includes(randomWord));
                chosenWords.push(randomWord);
            });
        }

        function initGame() {
            if (currentLevel >= chosenWords.length) {
                showMessage(`🎉 TEBRİKLER! Jargis Oyununu ${currentScore} Toplam Skorla Bitirdiniz!`, "#10b981");
                inputArea.style.display = "none";
                meaningCard.style.display = "none";
                jargonHintEl.innerText = "🏆 OYUN TAMAMLANDI";
                return;
            }

            isLevelOver = false;
            const currentData = chosenWords[currentLevel];
            targetWord = currentData.word.toUpperCase().replace(/I/g, "İ");
            wordLength = targetWord.length;
            maxGuesses = wordLength; 
            currentRow = 0;

            // Arayüz Güncellemeleri
            levelInfoEl.innerText = `${currentLevel + 1} / ${chosenWords.length}`;
            scoreInfoEl.innerText = currentScore;
            jargonHintEl.innerText = `💡 Jargon: ${currentData.hint}`;
            guessInput.maxLength = wordLength;
            guessInput.value = "";
            inputArea.style.display = "flex";
            guessInput.disabled = false;
            guessBtn.disabled = false;
            messageEl.innerText = "";
            meaningCard.style.display = "none";
            nextBtn.style.display = "none";

            // Matris Kurulumu
            matrixEl.innerHTML = "";
            matrixEl.style.gridTemplateColumns = `repeat(${wordLength}, 52px)`;
            
            for (let i = 0; i < maxGuesses; i++) {
                for (let j = 0; j < wordLength; j++) {
                    const cell = document.createElement("div");
                    cell.classList.add("cell");
                    cell.setAttribute("id", `cell-${i}-${j}`);
                    
                    // Lingo kuralı: İlk satırın ilk hücresine ilk harf yerleştirilir
                    if (i === 0 && j === 0) {
                        cell.innerText = targetWord[0];
                    }
                    
                    matrixEl.appendChild(cell);
                }
            }
            guessInput.focus();
        }

        function handleGuess() {
            if (isLevelOver) return;

            let guess = guessInput.value.trim().toUpperCase().replace(/I/g, "İ");
            
            if (guess.length !== wordLength) {
                showMessage(`Lütfen ${wordLength} harfli bir kelime girin!`, "#f59e0b");
                return;
            }

            messageEl.innerText = "";
            const targetLetterCounts = {};
            
            for (let char of targetWord) {
                targetLetterCounts[char] = (targetLetterCounts[char] || 0) + 1;
            }

            const states = Array(wordLength).fill("absent");

            // 1. Aşama: Yeşiller (Doğru yer)
            for (let i = 0; i < wordLength; i++) {
                if (guess[i] === targetWord[i]) {
                    states[i] = "correct";
                    targetLetterCounts[guess[i]]--;
                }
            }

            // 2. Aşama: Sarılar (Yanlış yer ama kelimede var)
            for (let i = 0; i < wordLength; i++) {
                if (states[i] !== "correct") {
                    if (targetLetterCounts[guess[i]] && targetLetterCounts[guess[i]] > 0) {
                        states[i] = "present";
                        targetLetterCounts[guess[i]]--;
                    }
                }
            }

            // Renkleri hücrelere giydir
            for (let i = 0; i < wordLength; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                cell.innerText = guess[i];
                cell.classList.add(states[i]);
            }

            // KAZANMA DURUMU
            if (guess === targetWord) {
                isLevelOver = true;
                const pointsEarned = (maxGuesses - currentRow) * 10;
                currentScore += pointsEarned;
                scoreInfoEl.innerText = currentScore;

                showMessage(`🎉 Harika! Kelimeyi Bildiniz (+${pointsEarned} Puan)`, "#10b981");
                endLevel();
                return;
            }

            currentRow++;

            // KAYBETME DURUMU
            if (currentRow >= maxGuesses) {
                isLevelOver = true;
                showMessage(`😔 Hakkınız bitti! Doğru Kelime: ${targetWord}`, "#ef4444");
                endLevel();
            } else {
                // Sonraki satırın ilk hücresine ilk harfi ipucu olarak koy
                const nextRowFirstCell = document.getElementById(`cell-${currentRow}-0`);
                if (nextRowFirstCell) nextRowFirstCell.innerText = targetWord[0];
                guessInput.value = "";
                guessInput.focus();
            }
        }

        function endLevel() {
            guessInput.disabled = true;
            guessBtn.disabled = true;
            
            const currentData = chosenWords[currentLevel];
            meaningTitle.innerText = `${currentData.word} (${currentData.hint} Jargonu)`;
            meaningText.innerText = currentData.meaning;
            
            meaningCard.style.display = "block";
            nextBtn.style.display = "block";
        }

        function showMessage(msg, color = "#ef4444") {
            messageEl.style.color = color;
            messageEl.innerText = msg;
        }

        // Event Listeners
        guessBtn.addEventListener("click", handleGuess);
        guessInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleGuess();
        });
        nextBtn.addEventListener("click", () => {
            currentLevel++;
            initGame();
        });

        // Oyunu ve kelime seansını başlat
        window.onload = () => {
            buildGameSession();
            initGame();
        };
    </script>
