<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jargis - Meslek Jargonları Oyunu</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --correct: #10b981;
            --present: #f59e0b;
            --absent: #475569;
            --border-color: #334155;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            width: 100%;
            border-bottom: 1px solid var(--border-color);
            background-color: #111827;
        }

        h1 {
            margin: 0;
            letter-spacing: 4px;
            color: var(--accent);
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .stat-box {
            background-color: var(--card-bg);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .stat-value {
            font-weight: bold;
            color: var(--accent);
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }

        .jargon-hint {
            background-color: #1e1b4b;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.05rem;
            margin-bottom: 20px;
            border: 1px solid #6366f1;
            color: #e0e7ff;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .matrix {
            display: grid;
            gap: 6px;
            margin-bottom: 20px;
        }

        .cell {
            width: 52px;
            height: 52px;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.3s ease;
            background-color: rgba(30, 41, 59, 0.5);
        }

        .cell.correct { background-color: var(--correct); border-color: var(--correct); }
        .cell.present { background-color: var(--present); border-color: var(--present); }
        .cell.absent { background-color: var(--absent); border-color: var(--absent); }

        .input-area {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 14px;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        button {
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: bold;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .message {
            min-height: 25px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .meaning-card {
            background-color: #1e293b;
            border-left: 5px solid var(--accent);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .meaning-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .meaning-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #cbd5e1;
        }

        .next-btn {
            background-color: var(--correct);
            color: white;
            margin-top: 15px;
            display: none;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>JARGIS</h1>
        <small style="color: #94a3b8; letter-spacing: 1px;">sozluk.gov.tr Temelli Meslek Jargonları Oyunu</small>
        <div class="stats-bar">
            <div class="stat-box">Kelime: <span id="levelInfo" class="stat-value">1 / 10</span></div>
            <div class="stat-box">Skor: <span id="scoreInfo" class="stat-value">0</span></div>
        </div>
    </header>

    <div class="game-container">
        <div class="jargon-hint" id="jargonHint">💡 Jargon: Yükleniyor...</div>
        
        <div class="matrix" id="matrix"></div>

        <div class="input-area" id="inputArea">
            <input type="text" id="guessInput" placeholder="Tahmininizi yazın" maxlength="4" autocomplete="off">
            <button id="guessBtn">TAHMİN ET</button>
        </div>

        <div class="message" id="message"></div>

        <div class="meaning-card" id="meaningCard">
            <div class="meaning-title" id="meaningTitle">KELİME VE ANLAMI</div>
            <div class="meaning-text" id="meaningText">Kelimenin sözlükteki tanımı burada görünecek.</div>
            <button class="next-btn" id="nextBtn">SONRAKİ KELİME ➔</button>
        </div>
    </div>

    <script>
        // Oyun Kelime Havuzu (sozluk.gov.tr verilerine ve anlamlarına uygun olarak hazırlanmıştır)
        const wordList = [
            // 4 Harfliler
            { word: "BURS", hint: "Eğitim", meaning: "Bir öğrencinin öğrenimini sürdürebilmesi veya bir kimsenin bilgi ve görgüsünü artırabilmesi için devletçe veya özel kuruluşlarca ayrılan aylık ödenek." },
            { word: "İLAM", hint: "Hukuk", meaning: "Bir davanın mahkemece nasıl bir hükme bağlandığını gösteren resmi mühürlü belge." },
            { word: "OROZ", hint: "Denizcilik", meaning: "Menteşeli pencereleri açıp kapamaya yarayan demir mandal veya gemi demirlerindeki kilit mekanizması mekanik parçası." },
            // 5 Harfliler
            { word: "ANFOR", hint: "Arkeoloji", meaning: "Antik Dönem'e ait, dibi sivri, iki kulplu, zeytinyağı veya şarap taşımakta kullanılan pişmiş toprak kap (Amfora)." },
            { word: "RAYİÇ", hint: "Ticaret / Ekonomi", meaning: "Bir para biriminin veya malın piyasadaki satış ve sürüm değeri, cari fiyat." },
            { word: "LÜMEN", hint: "Tıp / Fizik", meaning: "Anatomide damar veya içi boş organların içindeki boşluk; Fizikte ise bir ışık kaynağının yaydığı toplam ışık akısının birimi." },
            // 6 Harfliler
            { word: "TAHKİM", hint: "Hukuk", meaning: "Taraflar arasındaki uyuşmazlıkların mahkeme yerine hakem adı verilen tarafsız üçüncü kişilerce çözümlenmesi yöntemi." },
            { word: "BORDRO", hint: "Maliye / Muhasebe", meaning: "Hesap durumunu gösteren çizelge; özellikle çalışanlara ödenen ücretlerin ayrıntılarını gösteren resmi belge." },
            { word: "BİYOPSİ", hint: "Tıp", meaning: "Tanı koyabilmek amacıyla canlı bir dokudan, mikroskop altında incelenmek üzere küçük bir parça alınması işlemi." },
            // 7 Harfli Final
            { word: "ARTEFAKT", hint: "Arkeoloji", meaning: "İnsan eliyle yapılmış, değiştirilmiş veya kullanılmış, arkeolojik önemi olan taşınabilir her türlü nesne veya yapay olgu." }
        ];

        let currentLevel = 0;
        let currentScore = 0;
        let currentRow = 0;
        let targetWord = "";
        let wordLength = 0;
        let maxGuesses = 0;
        let isLevelOver = false;

        const matrixEl = document.getElementById("matrix");
        const guessInput = document.getElementById("guessInput");
        const guessBtn = document.getElementById("guessBtn");
        const jargonHintEl = document.getElementById("jargonHint");
        const levelInfoEl = document.getElementById("levelInfo");
        const scoreInfoEl = document.getElementById("scoreInfo");
        const messageEl = document.getElementById("message");
        const meaningCard = document.getElementById("meaningCard");
        const meaningTitle = document.getElementById("meaningTitle");
        const meaningText = document.getElementById("meaningText");
        const nextBtn = document.getElementById("nextBtn");
        const inputArea = document.getElementById("inputArea");

        function initGame() {
            if (currentLevel >= wordList.length) {
                showMessage(`🎉 TEBRİKLER! Jargis Oyununu ${currentScore} Toplam Skorla Bitirdiniz!`, "#10b981");
                inputArea.style.display = "none";
                meaningCard.style.display = "none";
                jargonHintEl.innerText = "🏆 OYUN TAMAMLANDI";
                return;
            }

            isLevelOver = false;
            const currentData = wordList[currentLevel];
            targetWord = currentData.word.toUpperCase();
            wordLength = targetWord.length;
            maxGuesses = wordLength; 
            currentRow = 0;

            // Arayüz Güncellemeleri
            levelInfoEl.innerText = `${currentLevel + 1} / ${wordList.length}`;
            scoreInfoEl.innerText = currentScore;
            jargonHintEl.innerText = `💡 Jargon: ${currentData.hint}`;
            guessInput.maxLength = wordLength;
            guessInput.value = "";
            inputArea.style.display = "flex";
            guessInput.disabled = false;
            guessBtn.disabled = false;
            messageEl.innerText = "";
            meaningCard.style.display = "none";
            nextBtn.style.display = "none";

            // Matris Kurulumu
            matrixEl.innerHTML = "";
            matrixEl.style.gridTemplateColumns = `repeat(${wordLength}, 52px)`;
            
            for (let i = 0; i < maxGuesses; i++) {
                for (let j = 0; j < wordLength; j++) {
                    const cell = document.createElement("div");
                    cell.classList.add("cell");
                    cell.setAttribute("id", `cell-${i}-${j}`);
                    
                    // Lingo kuralı: İlk satırın ilk hücresine ilk harf yerleştirilir
                    if (i === 0 && j === 0) {
                        cell.innerText = targetWord[0];
                    }
                    
                    matrixEl.appendChild(cell);
                }
            }
            guessInput.focus();
        }

        function handleGuess() {
            if (isLevelOver) return;

            let guess = guessInput.value.trim().toUpperCase();
            // Türkçe karakter esnekliği (I-İ dönüşümleri için ek önlem)
            guess = guess.replace(/I/g, "İ");
            
            if (guess.length !== wordLength) {
                showMessage(`Lütfen ${wordLength} harfli bir kelime girin!`, "#f59e0b");
                return;
            }

            messageEl.innerText = "";
            const targetLetterCounts = {};
            
            for (let char of targetWord) {
                targetLetterCounts[char] = (targetLetterCounts[char] || 0) + 1;
            }

            const states = Array(wordLength).fill("absent");

            // 1. Aşama: Yeşiller (Doğru yer)
            for (let i = 0; i < wordLength; i++) {
                if (guess[i] === targetWord[i]) {
                    states[i] = "correct";
                    targetLetterCounts[guess[i]]--;
                }
            }

            // 2. Aşama: Sarılar (Yanlış yer ama kelimede var)
            for (let i = 0; i < wordLength; i++) {
                if (states[i] !== "correct") {
                    if (targetLetterCounts[guess[i]] && targetLetterCounts[guess[i]] > 0) {
                        states[i] = "present";
                        targetLetterCounts[guess[i]]--;
                    }
                }
            }

            // Renkleri hücrelere giydir
            for (let i = 0; i < wordLength; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                cell.innerText = guess[i];
                cell.classList.add(states[i]);
            }

            // KAZANMA DURUMU
            if (guess === targetWord) {
                isLevelOver = true;
                // Skor hesaplama: Kalan haklar ölçüsünde bonus skor eklenir
                const pointsEarned = (maxGuesses - currentRow) * 10;
                currentScore += pointsEarned;
                scoreInfoEl.innerText = currentScore;

                showMessage(`🎉 Harika! Kelimeyi Bildiniz (+${pointsEarned} Puan)`, "#10b981");
                endLevel();
                return;
            }

            currentRow++;

            // KAYBETME DURUMU
            if (currentRow >= maxGuesses) {
                isLevelOver = true;
                showMessage(`😔 Hakkınız bitti! Doğru Kelime: ${targetWord}`, "#ef4444");
                endLevel();
            } else {
                // Sonraki satırın ilk hücresine ilk harfi ipucu olarak koy
                const nextRowFirstCell = document.getElementById(`cell-${currentRow}-0`);
                if (nextRowFirstCell) nextRowFirstCell.innerText = targetWord[0];
                guessInput.value = "";
                guessInput.focus();
            }
        }

        function endLevel() {
            guessInput.disabled = true;
            guessBtn.disabled = true;
            
            // Sözlük Anlamını Göster
            const currentData = wordList[currentLevel];
            meaningTitle.innerText = `${currentData.word} (${currentData.hint} Jargonu)`;
            meaningText.innerText = currentData.meaning;
            
            meaningCard.style.display = "block";
            nextBtn.style.display = "block";
        }

        function showMessage(msg, color = "#ef4444") {
            messageEl.style.color = color;
            messageEl.innerText = msg;
        }

        // Etkinlik Dinleyicileri
        guessBtn.addEventListener("click", handleGuess);
        guessInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleGuess();
        });
        nextBtn.addEventListener("click", () => {
            currentLevel++;
            initGame();
        });

        // Oyunu başlat
        window.onload = initGame;
    </script>
</body>
</html>
