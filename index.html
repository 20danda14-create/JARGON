<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jargis - Meslek Jargonları Oyunu</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --correct: #10b981;
            --present: #f59e0b;
            --absent: #475569;
            --border-color: #334155;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        header {
            text-align: center;
            padding: 15px;
            width: 100%;
            border-bottom: 1px solid var(--border-color);
            background-color: #111827;
            box-sizing: border-box;
        }

        h1 {
            margin: 0;
            letter-spacing: 4px;
            color: var(--accent);
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            margin-top: 10px;
            padding: 0 5px;
            box-sizing: border-box;
        }

        .stat-box {
            background-color: var(--card-bg);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        .stat-value {
            font-weight: bold;
            color: var(--accent);
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }

        .jargon-hint {
            background-color: #1e1b4b;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            margin-bottom: 15px;
            border: 1px solid #6366f1;
            color: #e0e7ff;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .matrix {
            display: grid;
            gap: 5px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .cell {
            width: 42px;
            height: 42px;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.3s ease;
            background-color: rgba(30, 41, 59, 0.5);
        }

        .cell.correct { background-color: var(--correct); border-color: var(--correct); }
        .cell.present { background-color: var(--present); border-color: var(--present); }
        .cell.absent { background-color: var(--absent); border-color: var(--absent); }

        .input-area {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .message {
            min-height: 25px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .meaning-card {
            background-color: #1e293b;
            border-left: 5px solid var(--accent);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            width: 100%;
            box-sizing: border-box;
            margin-top: 5px;
            display: none;
        }

        .meaning-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .meaning-text {
            font-size: 0.85rem;
            line-height: 1.4;
            color: #cbd5e1;
        }

        .next-btn {
            background-color: var(--correct);
            color: white;
            margin-top: 12px;
            display: none;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>JARGIS</h1>
        <small style="color: #94a3b8; letter-spacing: 1px;">sozluk.gov.tr Temelli Jargon Oyunu</small>

                { word: "MÜSVED", hint: "Yazın / Büro", meaning: "Üzerinde düzeltmeler yapılmak amacıyla yazılan resmiyet kazanmamış taslak kâğıt (Müsvedde)." },
                { word: "İNDEKS", hint: "Bilişim / Yayıncılık", meaning: "Bilişimde verilere hızlı erişim sağlayan dizin yapısı; kitaplarda arama dizini." },
                { word: "PLAZMA", hint: "Fizik / Tıp", meaning: "Fizikte gazın iyonize olmuş dördüncü hali; tıpta kanın hücrelerinden ayrıştırılmış sıvı kısmı." },
                { word: "FİKSTÜ", hint: "Spor / Yayıncılık", meaning: "Spor müsabakalarında karşılaşacak takımların maç takvimini gösteren çizelge (Fikstür)." },
                { word: "KADAST", hint: "Hukuk / Coğrafya", meaning: "Ülkedeki her çeşit arazi ve mülk yerinin sınırlarını belirleyip plana bağlama işi (Kadastro)." },
                { word: "DEFANS", hint: "Spor / Askeri", meaning: "Bir takımı veya bölgeyi rakip saldırılara karşı koruma amacıyla yapılan savunma düzeni." },
                { word: "KÜVETİ", hint: "Laboratuvar / Kimya", meaning: "Spektrofotometre cihazlarında sıvı örneklerin optik ölçümünü yapmak için kullanılan küçük tüp (Küvet)." },
                { word: "GRAFİK", hint: "Matematik / Sanat", meaning: "Çizgiler, şemalar veya şekiller yardımıyla verilerin görsel olarak ifade edilmesi yöntemi." },
                { word: "FLAMAN", hint: "Fizik / Elektrik", meaning: "Ampullerin içinde elektrik akımıyla akkor durumuna gelerek ışık yayan ince dirençli tel." },
                { word: "İSTİNA", hint: "Hukuk", meaning: "İlk derece mahkemelerinin verdiği kararların, bir üst mahkeme tarafından yeniden incelenmesi yolu (İstinaf)." },
                { word: "VARYAN", hint: "Biyoloji / Tıp", meaning: "Bir virüsün mutasyon sonucu ortaya çıkan farklılaşmış yeni alt türü (Varyant)." },
                { word: "BOMBELE", hint: "Mekanik / Sanayi", meaning: "Metal veya cam yüzeylerin dışa doğru kavisli, şişkin hale getirilmesi işlemi (Bombeli)." },
                { word: "REÇETE", hint: "Tıp / Eczacılık", meaning: "Hekimin hastası için gerekli gördüğü ilaçları ve kullanım şeklini üzerine yazdığı resmi belge." }
            ],
            7: [
                { word: "ARTEFAK", hint: "Arkeoloji", meaning: "Antik dönemlerde insan eliyle yapılmış, taşınabilir kültür varlığı niteliğindeki her türlü nesne (Artefakt)." },
                { word: "OTOPOT", hint: "Denizcilik / Havacılık", meaning: "Gemi veya uçakların rotada insan müdahalesi olmadan sabit kalmasını sağlayan otomatik pilot düzeneği (Otopilot)." },
                { word: "OTOMOTİ", hint: "Sanayi / Mühendislik", meaning: "Motorlu kara taşıtlarının tasarımı, üretimi ve pazarlanmasıyla ilgilenen sanayi kolu (Otomotiv)." },
                { word: "GÖZLEME", hint: "Havacılık / Meteoroloji", meaning: "Hava durumunu veya gökyüzü olaylarını belirli araçlarla takip edip kaydetme işi, rasat." },
                { word: "KÜRATÖR", hint: "Sanat / Müzecilik", meaning: "Sergileri düzenleyen, müze koleksiyonlarını yöneten ve sanatsal arşivlerden sorumlu olan uzman." },
                { word: "BİLANÇO", hint: "Muhasebe / Finans", meaning: "Bir ticari kuruluşun belirli bir andaki varlık ve borç dengesini gösteren en temel mali tablo." },
                { word: "STETOSK", hint: "Tıp / Sağlık", meaning: "Hekimlerin kalp ve akciğer seslerini dinlemek için kullandığı tıbbi muayene cihazı (Stetoskop)." },
                { word: "EMPRİME", hint: "Tekstil", meaning: "Kumaş üzerine özel boyalar ve kalıplar kullanılarak renkli desenler basma işlemi." },
                { word: "MUKAVEL", hint: "Hukuk / Ticaret", meaning: "İki tarafın karşılıklı mutabakatla imzaladığı, yasal yükümlülük doğuran sözleşme (Mukavele)." },
                { word: "REAKTÖR", hint: "Nükleer / Kimya", meaning: "Nükleer zincirleme reaksiyonların kontrollü olarak gerçekleştirildiği veya kimyasal dönüşümlerin yapıldığı tesis." },
                { word: "ANESTEZ", hint: "Tıp / Cerrahi", meaning: "Ameliyat öncesinde hastanın ağrı duymasını engellemek amacıyla uygulanan tıbbi duyarsızlaştırma (Anestezi)." },
                { word: "MÜEZZİN", hint: "Din Hizmetleri", meaning: "Camilerde namaz vaktinin geldiğini bildirmek üzere ezan okuyan din görevlisi." },
                { word: "KADASTRO", hint: "Hukuk / Haritacılık", meaning: "Ülke sınırları içindeki taşınmaz malların sınırlarını ve yasal hak sahiplerini belirleyen resmi sistem." },
                { word: "FAKTORİ", hint: "Finans / Ticaret", meaning: "Şirketlerin vadeli alacaklarını devrederek acil nakit ihtiyaçlarını karşıladıkları yöntem (Faktoring)." },
                { word: "PROTOTİ", hint: "Mühendislik / Tasarım", meaning: "Seri üretime geçilmeden önce test edilmek amacıyla üretilen ilk model, özgün örnek (Prototip)." },
                { word: "VARYANT", hint: "Tıp / İstatistik", meaning: "Tıpta mutasyona uğramış virüs tipi; istatistikte bir değişkenin aldığı farklı değerlerden her biri." },
                { word: "TUTANAK", hint: "Hukuk / Büro", meaning: "Durumu tespit etmek amacıyla yetkililerce imzalanan resmi yazı, zabıt." },
                { word: "FLAMANL", hint: "Elektrik / Sanayi", meaning: "Ampulün içinde ışık üreten akkor tel mekanizmasının teknik yapısı (Flamanlı)." },
                { word: "TRİBÜNA", hint: "Hukuk / Tarih", meaning: "Antik Roma'da halkın haklarını koruyan yargıçlar kurulu veya uluslararası özel mahkemeler (Tribunal)." },
                { word: "KAPSÜLE", hint: "Farmakoloji / Kimya", meaning: "İlaçların yutulmasını kolaylaştırmak için etken maddenin içine konulduğu eriyebilir küçük kılıf (Kapsül)." }
            ]
        };

        // Kurala Tam Uyan Sıralı Yapı (3x 4 Harfli, 3x 5 Harfli, 3x 6 Harfli, 1x 7 Harfli)
        const gameStructure = [4, 4, 4, 5, 5, 5, 6, 6, 6, 7];
        let chosenWords = []; 

        let currentLevel = 0;
        let currentScore = 0;
        let currentRow = 0;
        let targetWord = "";
        let wordLength = 0;
        let maxGuesses = 0;
        let isLevelOver = false;

        const matrixEl = document.getElementById("matrix");
        const guessInput = document.getElementById("guessInput");
        const guessBtn = document.getElementById("guessBtn");
        const jargonHintEl = document.getElementById("jargonHint");
        const levelInfoEl = document.getElementById("levelInfo");
        const scoreInfoEl = document.getElementById("scoreInfo");
        const messageEl = document.getElementById("message");
        const meaningCard = document.getElementById("meaningCard");
        const meaningTitle = document.getElementById("meaningTitle");
        const meaningText = document.getElementById("meaningText");
        const nextBtn = document.getElementById("nextBtn");
        const inputArea = document.getElementById("inputArea");

        function buildGameSession() {
            chosenWords = [];
            gameStructure.forEach(length => {
                const pool = masterDictionary[length];
                let randomWord;
                // Aynı seansta aynı kelimenin iki kere gelmesini engelle
                do {
                    randomWord = pool[Math.floor(Math.random() * pool.length)];
                } while (chosenWords.includes(randomWord));
                chosenWords.push(randomWord);
            });
        }

        function initGame() {
            if (currentLevel >= chosenWords.length) {
                showMessage(`🎉 TEBRİKLER! Jargis Oyununu ${currentScore} Skorla Bitirdiniz!`, "#10b981");
                inputArea.style.display = "none";
                meaningCard.style.display = "none";
                jargonHintEl.innerText = "🏆 OYUN TAMAMLANDI";
                return;
            }

            isLevelOver = false;
            const currentData = chosenWords[currentLevel];
            targetWord = currentData.word.toUpperCase().replace(/I/g, "İ");
            wordLength = targetWord.length;
            maxGuesses = wordLength; 
            currentRow = 0;

            // Mobil Arayüz Güncellemeleri
            levelInfoEl.innerText = `${currentLevel + 1} / ${chosenWords.length}`;
            scoreInfoEl.innerText = currentScore;
            jargonHintEl.innerText = `💡 Jargon: ${currentData.hint}`;
            guessInput.maxLength = wordLength;
            guessInput.value = "";
            inputArea.style.display = "flex";
            guessInput.disabled = false;
            guessBtn.disabled = false;
            messageEl.innerText = "";
            meaningCard.style.display = "none";
            nextBtn.style.display = "none";

            // Matris Yapılandırması
            matrixEl.innerHTML = "";
            matrixEl.style.gridTemplateColumns = `repeat(${wordLength}, 42px)`;
            
            for (let i = 0; i < maxGuesses; i++) {
                for (let j = 0; j < wordLength; j++) {
                    const cell = document.createElement("div");
                    cell.classList.add("cell");
                    cell.setAttribute("id", `cell-${i}-${j}`);
                    
                    if (i === 0 && j === 0) {
                        cell.innerText = targetWord[0];
                    }
                    
                    matrixEl.appendChild(cell);
                }
            }
            guessInput.focus();
        }

        function handleGuess() {
            if (isLevelOver) return;

            let guess = guessInput.value.trim().toUpperCase().replace(/I/g, "İ");
            
            if (guess.length !== wordLength) {
                showMessage(`Lütfen ${wordLength} harfli bir kelime girin!`, "#f59e0b");
                return;
            }

            messageEl.innerText = "";
            const targetLetterCounts = {};
            
            for (let char of targetWord) {
                targetLetterCounts[char] = (targetLetterCounts[char] || 0) + 1;
            }

            const states = Array(wordLength).fill("absent");

            // Yeşiller
            for (let i = 0; i < wordLength; i++) {
                if (guess[i] === targetWord[i]) {
                    states[i] = "correct";
                    targetLetterCounts[guess[i]]--;
                }
            }

            // Sarılar
            for (let i = 0; i < wordLength; i++) {
                if (states[i] !== "correct") {
                    if (targetLetterCounts[guess[i]] && targetLetterCounts[guess[i]] > 0) {
                        states[i] = "present";
                        targetLetterCounts[guess[i]]--;
                    }
                }
            }

            // Hücreleri Boya
            for (let i = 0; i < wordLength; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                if (cell) {
                    cell.innerText = guess[i];
                    cell.className = `cell ${states[i]}`;
                }
            }

            if (guess === targetWord) {
                isLevelOver = true;
                const pointsEarned = (maxGuesses - currentRow) * 10;
                currentScore += pointsEarned;
                scoreInfoEl.innerText = currentScore;

                showMessage(`🎉 Harika! Doğru Tahmin (+${pointsEarned} Puan)`, "#10b981");
                endLevel();
                return;
            }

            currentRow++;

            if (currentRow >= maxGuesses) {
                isLevelOver = true;
                showMessage(`😔 Hak bitti! Doğru Kelime: ${targetWord}`, "#ef4444");
                endLevel();
            } else {
                const nextRowFirstCell = document.getElementById(`cell-${currentRow}-0`);
                if (nextRowFirstCell) nextRowFirstCell.innerText = targetWord[0];
                guessInput.value = "";
                guessInput.focus();
            }
        }

        function endLevel() {
            guessInput.disabled = true;
            guessBtn.disabled = true;
            
            const currentData = chosenWords[currentLevel];
            meaningTitle.innerText = `${currentData.word} (${currentData.hint} Jargonu)`;
            meaningText.innerText = currentData.meaning;
            
            meaningCard.style.display = "block";
            nextBtn.style.display = "block";
        }

        function showMessage(msg, color = "#ef4444") {
            messageEl.style.color = color;
            messageEl.innerText = msg;
        }

        guessBtn.addEventListener("click", handleGuess);
        guessInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleGuess();
        });
        nextBtn.addEventListener("click", () => {
            currentLevel++;
            initGame();
        });

        window.onload = () => {
            buildGameSession();
            initGame();
        };
    </script>
</body>
