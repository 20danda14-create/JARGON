<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jargon - Meslek Jargonları Oyunu</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #ffffff;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --border-color: #565758;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            width: 100%;
            border-bottom: 1px solid var(--absent);
        }

        h1 {
            margin: 0;
            letter-spacing: 3px;
            color: #f7d070;
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        .level-info {
            font-size: 1.1rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .jargon-hint {
            background-color: #2c2c35;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1rem;
            margin-bottom: 20px;
            border: 1px solid #f7d070;
            color: #f7d070;
            font-weight: 600;
        }

        .matrix {
            display: grid;
            gap: 5px;
            margin-bottom: 20px;
        }

        .cell {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .cell.correct { background-color: var(--correct); border-color: var(--correct); }
        .cell.present { background-color: var(--present); border-color: var(--present); }
        .cell.absent { background-color: var(--absent); border-color: var(--absent); }

        .input-area {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
        }

        input:focus {
            outline: none;
            border-color: #f7d070;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #f7d070;
            color: #121214;
            border: none;
            border-radius: 6px;
            cursor:pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .message {
            height: 25px;
            font-weight: bold;
            color: #ff6b6b;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>JARGON</h1>
        <small>sozluk.gov.tr Temelli Kelime Oyunu</small>
    </header>

    <div class="game-container">
        <div class="level-info" id="levelInfo">Kelime: 1 / 10</div>
        <div class="jargon-hint" id="jargonHint">💡 Jargon: Yükleniyor...</div>
        
        <div class="matrix" id="matrix"></div>

        <div class="input-area">
            <input type="text" id="guessInput" placeholder="Tahmininizi yazın" maxlength="4" autocomplete="off">
            <button id="guessBtn">TAHMİN ET</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        // Oyun Kelime Havuzu (sozluk.gov.tr verilerine uygun ölçekleme)
        const wordList = [
            // 4 Harfliler
            { word: "BURS", hint: "Eğitim" },
            { word: "İLAM", hint: "Hukuk" },
            { word: "OROZ", hint: "Denizcilik" },
            // 5 Harfliler
            { word: "ANFOR", hint: "Arkeoloji" },
            { word: "RAYİÇ", hint: "Ticaret / Ekonomi" },
            { word: "LÜMEN", hint: "Tıp / Fizik" },
            // 6 Harfliler
            { word: "TAHKİM", hint: "Hukuk" },
            { word: "BORDRO", hint: "Maliye / Muhasebe" },
            { word: "BİYOPSİ", hint: "Tıp" },
            // 7 Harfli Final
            { word: "ARTEFAKT", hint: "Arkeoloji" }
        ];

        let currentLevel = 0;
        let currentRow = 0;
        let targetWord = "";
        let wordLength = 0;
        let maxGuesses = 0;

        const matrixEl = document.getElementById("matrix");
        const guessInput = document.getElementById("guessInput");
        const guessBtn = document.getElementById("guessBtn");
        const jargonHintEl = document.getElementById("jargonHint");
        const levelInfoEl = document.getElementById("levelInfo");
        const messageEl = document.getElementById("message");

        function initGame() {
            if (currentLevel >= wordList.length) {
                messageEl.style.color = "#538d4e";
                messageEl.innerText = "🎉 TEBRİKLER! Tüm jargonları başarıyla tamamladınız!";
                guessInput.disabled = true;
                guessBtn.disabled = true;
                return;
            }

            const currentData = wordList[currentLevel];
            targetWord = currentData.word.toUpperCase();
            wordLength = targetWord.length;
            maxGuesses = wordLength; // Harf sayısı kadar tahmin hakkı
            currentRow = 0;

            // Arayüz Güncellemeleri
            levelInfoEl.innerText = `Kelime: ${currentLevel + 1} / ${wordList.length} (${wordLength} Harfli)`;
            jargonHintEl.innerText = `💡 Jargon: ${currentData.hint}`;
            guessInput.maxLength = wordLength;
            guessInput.value = "";
            guessInput.disabled = false;
            guessBtn.disabled = false;
            messageEl.innerText = "";

            // Matris Kurulumu
            matrixEl.innerHTML = "";
            matrixEl.style.gridTemplateColumns = `repeat(${wordLength}, 50px)`;
            
            for (let i = 0; i < maxGuesses; i++) {
                for (let j = 0; j < wordLength; j++) {
                    const cell = document.createElement("div");
                    cell.classList.add("cell");
                    cell.setAttribute("id", `cell-${i}-${j}`);
                    
                    // İlk satırın ilk hücresine ipucu harfi yerleştir (Lingo kuralı)
                    if (i === 0 && j === 0) {
                        cell.innerText = targetWord[0];
                    }
                    
                    matrixEl.appendChild(cell);
                }
            }
        }

        function handleGuess() {
            const guess = guessInput.value.trim().toUpperCase().replace(/I/g, "İ"); // Türkçe harf düzeltmesi esnekliği
            
            if (guess.length !== wordLength) {
                showMessage(`Lütfen ${wordLength} harfli bir kelime girin!`);
                return;
            }

            messageEl.innerText = "";
            const targetLetterCounts = {};
            
            // Harf havuzu frekansı hesaplama (Aynı harften kaç adet var kontrolü için)
            for (let char of targetWord) {
                targetLetterCounts[char] = (targetLetterCounts[char] || 0) + 1;
            }

            const states = Array(wordLength).fill("absent");

            // 1. Aşama: Tam eşleşen yeşilleri (correct) bulma
            for (let i = 0; i < wordLength; i++) {
                if (guess[i] === targetWord[i]) {
                    states[i] = "correct";
                    targetLetterCounts[guess[i]]--;
                }
            }

            // 2. Aşama: Kelimede var ama yeri yanlış olan sarıları (present) bulma
            for (let i = 0; i < wordLength; i++) {
                if (states[i] !== "correct") {
                    if (targetLetterCounts[guess[i]] && targetLetterCounts[guess[i]] > 0) {
                        states[i] = "present";
                        targetLetterCounts[guess[i]]--;
                    }
                }
            }

            // Arayüze Renkleri Giydirme
            for (let i = 0; i < wordLength; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                cell.innerText = guess[i];
                cell.classList.add(states[i]);
            }

            // Kazanma / Kaybetme Kontrolü
            if (guess === targetWord) {
                showMessage("🎉 Doğru Jargon! Sonraki kelimeye geçiliyor...", "#538d4e");
                guessInput.disabled = true;
                guessBtn.disabled = true;
                setTimeout(() => {
                    currentLevel++;
                    initGame();
                }, 2000);
                return;
            }

            currentRow++;

            if (currentRow >= maxGuesses) {
                showMessage(`😔 Hakkınız bitti! Doğru Kelime: ${targetWord}`, "#ff6b6b");
                guessInput.disabled = true;
                guessBtn.disabled = true;
                setTimeout(() => {
                    initGame(); // Aynı seviyeyi sıfırlar veya bir sonrakine geçiş tercihinize bağlıdır.
                }, 3000);
            } else {
                // Sonraki satırın başına ipucu olarak yine ilk harfi koyalım
                const nextRowFirstCell = document.getElementById(`cell-${currentRow}-0`);
                if(nextRowFirstCell) nextRowFirstCell.innerText = targetWord[0];
                guessInput.value = "";
            }
        }

        function showMessage(msg, color = "#ff6b6b") {
            messageEl.style.color = color;
            messageEl.innerText = msg;
        }

        // Event Listeners
        guessBtn.addEventListener("click", handleGuess);
        guessInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleGuess();
        });

        // Oyunu Başlat
        window.onload = initGame;
    </script>
</body>
</html>
